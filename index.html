<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベースキャンプ - 旅のしおり</title>
  <style>
    /* --- 全体設定（共通スタイル） --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    /* 📱 基本はスマホ向けのスタイル（モバイルファースト） */
    .app-container {
      width: 100%;
      height: 100vh;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* 💻 画面幅が768px以上（パソコンやタブレット）になったら適用する魔法 */
    @media (min-width: 768px) {
      body {
        padding: 20px 0;
      }
      .app-container {
        max-width: 850px;       /* 横幅をパソコン用に広げる */
        height: 850px;          /* 高さを程よく固定 */
        max-height: 90vh;
        border-radius: 16px;    /* 角を丸くしておしゃれに */
        box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* 高級感のある影 */
      }
      /* ✨ パソコンの時だけ左右2カラムに割るための設定 */
      .responsive-layout {
        display: flex;
        gap: 25px;
        align-items: flex-start;
      }
      .layout-left {
        flex: 1;                /* 左側のフォーム枠 */
        position: sticky;
        top: 0;
      }
      .layout-right {
        flex: 1.3;              /* 右側のリスト枠を少し広めに */
      }
    }

    .hidden {
      display: none !important;
    }

    /* --- ログイン画面 --- */
    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
    }
    #login-screen form {
      max-width: 340px;
      width: 100%;
      margin: 0 auto; /* パソコン画面でも中央にきゅっと収まるように */
    }
    .brand-logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 10px;
    }
    .brand-subtitle {
      color: #6b7280;
      margin-bottom: 40px;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: #4b5563;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .input-group input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      background-color: #f9fafb;
    }
    .btn-primary {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* --- メイン画面（共通） --- */
    #main-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden; /* 全体がガタガタ動かないように防衛 */
    }
    header {
      background-color: #3b82f6;
      color: white;
      padding: 20px;
    }
    .group-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .group-name {
      font-size: 1.25rem;
      font-weight: bold;
    }
    .member-count {
      font-size: 0.85rem;
      background: rgba(255,255,255,0.2);
      padding: 4px 8px;
      border-radius: 20px;
    }
    .main-content {
      padding: 20px;
      flex: 1;
      overflow-y: auto; /* コンテンツが増えたらここだけがスクロールする */
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #1f2937;
    }

    /* フォーム周り */
    .form-card {
      background: #f3f4f6;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
    }
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .form-card input, .form-card select {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      background-color: #fff;
      width: 100%;
    }
    .btn-secondary {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
    }

      margin-bottom: 30px;
